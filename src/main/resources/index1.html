<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MemMunk — LSM Store</title>
<style>
:root {
  --bg:       #0d1117;
  --surface:  #161b22;
  --surface2: #21262d;
  --border:   #30363d;
  --text:     #e6edf3;
  --muted:    #8b949e;
  --blue:     #58a6ff;
  --green:    #3fb950;
  --yellow:   #d29922;
  --red:      #f85149;
  --radius:   6px;
  --mono:     'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 14px;
  min-height: 100vh;
}

/* ── Header ─────────────────────────────────────────────────── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: sticky;
  top: 0;
  z-index: 10;
}

.logo { font-size: 18px; font-weight: 700; letter-spacing: -.5px; }
.logo span { color: var(--blue); }

.stats-bar { display: flex; gap: 10px; }

.stat-chip {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 12px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--muted);
}
.stat-chip b { color: var(--text); }

/* ── Layout ──────────────────────────────────────────────────── */
main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

/* ── Cards ───────────────────────────────────────────────────── */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.card-header {
  padding: 9px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .6px;
  color: var(--muted);
}
.card-body { padding: 16px; }

/* ── Ops grid ────────────────────────────────────────────────── */
.ops-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

/* ── Form elements ───────────────────────────────────────────── */
.field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }

label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--muted);
}

input[type="text"] {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  padding: 7px 10px;
  outline: none;
  width: 100%;
  transition: border-color .15s;
}
input[type="text"]::placeholder { color: var(--muted); opacity: .6; }
input[type="text"]:focus { border-color: var(--blue); }

.btn-row { display: flex; gap: 8px; margin-top: 4px; }

button {
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  padding: 7px 14px;
  transition: opacity .15s, transform .1s;
  white-space: nowrap;
}
button:hover  { opacity: .85; }
button:active { transform: scale(.97); }

.btn-blue   { background: var(--blue);   color: #000; }
.btn-green  { background: var(--green);  color: #000; }
.btn-red    { background: var(--red);    color: #fff; }
.btn-yellow { background: var(--yellow); color: #000; }
.btn-ghost  { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }

/* ── Controls bar ────────────────────────────────────────────── */
.controls-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}

#result {
  flex: 1;
  font-family: var(--mono);
  font-size: 12px;
  padding: 6px 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: border-color .2s, color .2s;
}
#result.ok  { border-color: var(--green); color: var(--green); }
#result.err { border-color: var(--red);   color: var(--red); }

/* ── KV table ────────────────────────────────────────────────── */
table { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: 13px; }

thead { background: var(--surface2); }

th {
  text-align: left;
  padding: 8px 14px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
}

td {
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  max-width: 340px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
tr:last-child td { border-bottom: none; }
tbody tr { cursor: pointer; transition: background .1s; }
tbody tr:hover { background: var(--surface2); }

.td-idx   { color: var(--muted); width: 48px; }
.td-key   { color: var(--blue); }
.td-val   { color: var(--green); }
.td-acts  { width: 120px; }

.act-btn { padding: 3px 9px; font-size: 11px; }

.empty-state { text-align: center; color: var(--muted); padding: 36px; font-style: italic; font-size: 13px; }

/* ── Debug panel ─────────────────────────────────────────────── */
.debug-grid { display: grid; grid-template-columns: 220px 1fr; gap: 20px; }

.mem-big { font-family: var(--mono); font-size: 36px; font-weight: 700; color: var(--blue); line-height: 1; }
.mem-sub { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-top: 4px; }
.mem-entries {
  margin-top: 12px;
  display: flex;
  flex-direction: column;
  gap: 3px;
  max-height: 140px;
  overflow-y: auto;
}
.me { font-family: var(--mono); font-size: 11px; display: flex; gap: 6px; align-items: baseline; }
.me-k { color: var(--blue); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 90px; }
.me-v { color: var(--green); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 80px; }
.me-t { color: var(--red); font-style: italic; }

.section-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--muted);
  margin-bottom: 8px;
}

/* Tiers */
.tier-list { display: flex; flex-direction: column; gap: 7px; }
.tier-row  { display: flex; align-items: center; gap: 10px; }
.tier-name { font-family: var(--mono); font-size: 11px; color: var(--muted); width: 92px; flex-shrink: 0; }
.tier-track {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 3px;
  height: 8px;
  overflow: hidden;
}
.tier-fill { height: 100%; border-radius: 3px; background: var(--blue); transition: width .35s; }
.tier-fill.ready { background: var(--yellow); }
.tier-stat { font-family: var(--mono); font-size: 11px; color: var(--muted); width: 52px; text-align: right; flex-shrink: 0; }
.tier-stat.ready { color: var(--yellow); font-weight: 700; }

/* SSTable list */
.sst-list { display: flex; flex-direction: column; gap: 5px; max-height: 180px; overflow-y: auto; margin-top: 4px; }
.sst-row {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 7px 12px;
  font-family: var(--mono);
  font-size: 11px;
  display: grid;
  grid-template-columns: 28px 1fr auto;
  gap: 10px;
  align-items: center;
}
.sst-idx   { color: var(--muted); }
.sst-meta  { color: var(--text); }
.sst-range { color: var(--green); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: right; }

/* Scrollbars */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">Mem<span>Munk</span>
    <span style="font-size:12px;color:var(--muted);font-weight:400;margin-left:6px">LSM Store</span>
  </div>
  <div class="stats-bar">
    <div class="stat-chip">memtable&nbsp;<b id="hdr-mem">—</b></div>
    <div class="stat-chip">sstables&nbsp;<b id="hdr-sst">—</b></div>
    <div class="stat-chip" id="hdr-status" style="cursor:pointer" title="Click to refresh" onclick="refresh()">⟳ live</div>
  </div>
</header>

<main>

  <!-- Operation panels -->
  <div class="ops-grid">

    <div class="card">
      <div class="card-header">Put</div>
      <div class="card-body">
        <div class="field">
          <label>Key</label>
          <input id="put-key" type="text" placeholder="e.g. user:42">
        </div>
        <div class="field">
          <label>Value</label>
          <input id="put-val" type="text" placeholder="e.g. alice">
        </div>
        <button class="btn-blue" onclick="opPut()">PUT</button>
      </div>
    </div>

    <div class="card">
      <div class="card-header">Get / Delete</div>
      <div class="card-body">
        <div class="field">
          <label>Key</label>
          <input id="gd-key" type="text" placeholder="e.g. user:42">
        </div>
        <div class="btn-row">
          <button class="btn-ghost" onclick="opGet()">GET</button>
          <button class="btn-red"   onclick="opDelete()">DELETE</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">Scan by Prefix</div>
      <div class="card-body">
        <div class="field">
          <label>Prefix <span style="font-weight:400;text-transform:none;letter-spacing:0">(empty = all)</span></label>
          <input id="scan-prefix" type="text" placeholder="e.g. user:">
        </div>
        <button class="btn-ghost" onclick="opScan()">SCAN</button>
      </div>
    </div>

  </div>

  <!-- Controls bar -->
  <div class="controls-bar">
    <button class="btn-yellow" onclick="opFlush()">FLUSH</button>
    <button class="btn-ghost"  onclick="opCompact()">COMPACT</button>
    <div id="result">Ready — waiting for operations.</div>
  </div>

  <!-- Live KV table -->
  <div class="card">
    <div class="card-header">
      Live Key-Value Table
      <span id="kv-count" style="font-weight:400;color:var(--muted);text-transform:none;letter-spacing:0"></span>
    </div>
    <div id="kv-wrap">
      <div class="empty-state">No entries yet. Use PUT to add some data.</div>
    </div>
  </div>

  <!-- Debug panel -->
  <div class="card">
    <div class="card-header">Debug</div>
    <div class="card-body">
      <div class="debug-grid">

        <div>
          <div class="mem-big" id="dbg-mem-n">—</div>
          <div class="mem-sub">MemTable entries</div>
          <div class="mem-entries" id="dbg-mem-list"></div>
        </div>

        <div>
          <div class="section-label">
            Compaction tiers — threshold: <span id="dbg-threshold">—</span> files
          </div>
          <div class="tier-list" id="dbg-tiers"></div>

          <div class="section-label" style="margin-top:16px">
            SSTables on disk — <span id="dbg-sst-count">0</span>
          </div>
          <div class="sst-list" id="dbg-ssts">
            <div class="empty-state" style="padding:12px">No SSTables yet.</div>
          </div>
        </div>

      </div>
    </div>
  </div>

</main>

<script>
'use strict';

/* ── API wrapper ──────────────────────────────────────────────────────────── */

async function api(method, path, body) {
  try {
    const opts = { method };
    if (body !== undefined) {
      opts.headers = { 'Content-Type': 'application/json' };
      opts.body = JSON.stringify(body);
    }
    const res = await fetch(path, opts);
    const data = await res.json();
    return { ok: res.ok, status: res.status, data };
  } catch (e) {
    return { ok: false, status: 0, data: { error: e.message } };
  }
}

/* ── Result bar ───────────────────────────────────────────────────────────── */

function showResult(msg, isErr) {
  const el = document.getElementById('result');
  el.textContent = msg;
  el.className = isErr ? 'err' : 'ok';
}

/* ── Operations ───────────────────────────────────────────────────────────── */

async function opPut() {
  const key = val('put-key'), value = val('put-val');
  if (!key)   return showResult('Key is required.', true);
  if (!value) return showResult('Value is required.', true);
  const r = await api('POST', '/put', { key, value });
  showResult(r.ok ? `PUT "${key}" → "${value}"` : `Error: ${r.data.error}`, !r.ok);
  if (r.ok) await refresh();
}

async function opGet() {
  const key = val('gd-key');
  if (!key) return showResult('Key is required.', true);
  const r = await api('GET', `/get?key=${enc(key)}`);
  if (r.ok) {
    showResult(`"${key}" → "${r.data.value}"`, false);
  } else {
    showResult(r.status === 404 ? `"${key}" not found` : `Error: ${r.data.error}`, true);
  }
  await refreshDebug();
}

async function opDelete() {
  const key = val('gd-key');
  if (!key) return showResult('Key is required.', true);
  const r = await api('DELETE', `/delete?key=${enc(key)}`);
  showResult(r.ok ? `Deleted "${key}"` : `Error: ${r.data.error}`, !r.ok);
  if (r.ok) await refresh();
}

async function opScan() {
  const prefix = val('scan-prefix');
  const r = await api('GET', prefix ? `/scan?prefix=${enc(prefix)}` : '/scan');
  if (r.ok) {
    showResult(`Scan "${prefix || '*'}" → ${r.data.length} key${r.data.length !== 1 ? 's' : ''}`, false);
    renderTable(r.data);
  } else {
    showResult(`Error: ${r.data.error}`, true);
  }
  await refreshDebug();
}

async function opFlush() {
  const r = await api('POST', '/flush');
  showResult(r.ok ? `Flushed — ${r.data.sstables} SSTable(s) on disk` : `Error: ${r.data.error}`, !r.ok);
  if (r.ok) await refresh();
}

async function opCompact() {
  const r = await api('POST', '/compact');
  showResult(r.ok ? `Compact: ${r.data.before} → ${r.data.after} SSTable(s)` : `Error: ${r.data.error}`, !r.ok);
  if (r.ok) await refresh();
}

/* ── Table rendering ──────────────────────────────────────────────────────── */

function renderTable(rows) {
  const wrap  = document.getElementById('kv-wrap');
  const count = document.getElementById('kv-count');

  if (!rows || rows.length === 0) {
    wrap.innerHTML = '<div class="empty-state">No matching entries.</div>';
    count.textContent = '';
    return;
  }

  count.textContent = `— ${rows.length} entr${rows.length !== 1 ? 'ies' : 'y'}`;
  wrap.innerHTML =
    '<table>' +
    '<thead><tr><th class="td-idx">#</th><th>Key</th><th>Value</th><th class="td-acts"></th></tr></thead>' +
    '<tbody>' +
    rows.map((row, i) => {
      const k = esc(row.key), v = esc(row.value);
      const kj = JSON.stringify(row.key);
      return `<tr onclick="fillKey(${kj})">
        <td class="td-idx">${i + 1}</td>
        <td class="td-key">${k}</td>
        <td class="td-val">${v}</td>
        <td class="td-acts" onclick="event.stopPropagation()">
          <button class="btn-ghost act-btn" onclick="quickGet(${kj})">GET</button>
          <button class="btn-red   act-btn" onclick="quickDel(${kj})">DEL</button>
        </td>
      </tr>`;
    }).join('') +
    '</tbody></table>';
}

/* ── Debug panel rendering ────────────────────────────────────────────────── */

function renderDebug(d) {
  if (!d) return;

  /* header chips */
  document.getElementById('hdr-mem').textContent = d.memtable.size;
  document.getElementById('hdr-sst').textContent = d.sstables.length;

  /* memtable size */
  document.getElementById('dbg-mem-n').textContent = d.memtable.size;

  /* memtable entries (first 12) */
  const memEl = document.getElementById('dbg-mem-list');
  if (!d.memtable.entries.length) {
    memEl.innerHTML = '<span style="color:var(--muted);font-size:11px">empty</span>';
  } else {
    const shown = d.memtable.entries.slice(0, 12);
    const more  = d.memtable.entries.length - shown.length;
    memEl.innerHTML = shown.map(e =>
      e.tombstone
        ? `<div class="me"><span class="me-k">${esc(e.key)}</span><span class="me-t">tombstone</span></div>`
        : `<div class="me"><span class="me-k">${esc(e.key)}</span>
             <span style="color:var(--muted)">→</span>
             <span class="me-v">${esc(e.value)}</span></div>`
    ).join('') + (more > 0
      ? `<div class="me" style="color:var(--muted)">… ${more} more</div>`
      : '');
  }

  /* threshold label */
  document.getElementById('dbg-threshold').textContent = d.compaction.threshold;

  /* tier bars */
  document.getElementById('dbg-tiers').innerHTML = d.compaction.tiers.map(t => {
    const pct   = Math.min(100, (t.files / d.compaction.threshold) * 100);
    const ready = t.readyToCompact;
    return `<div class="tier-row">
      <div class="tier-name">Tier ${t.tier} <span style="opacity:.6">${t.label}</span></div>
      <div class="tier-track">
        <div class="tier-fill ${ready ? 'ready' : ''}" style="width:${pct}%"></div>
      </div>
      <div class="tier-stat ${ready ? 'ready' : ''}">${t.files}/${d.compaction.threshold}${ready ? ' ⚡' : ''}</div>
    </div>`;
  }).join('');

  /* SSTable list */
  document.getElementById('dbg-sst-count').textContent = d.sstables.length;
  const sstsEl = document.getElementById('dbg-ssts');
  if (!d.sstables.length) {
    sstsEl.innerHTML = '<div class="empty-state" style="padding:12px">No SSTables on disk yet.</div>';
  } else {
    sstsEl.innerHTML = d.sstables.map((s, i) =>
      `<div class="sst-row">
        <span class="sst-idx">#${i}</span>
        <span class="sst-meta">${esc(s.sizeHuman)} · ${s.entries} entr${s.entries !== 1 ? 'ies' : 'y'} · tier ${s.tier}</span>
        <span class="sst-range">${esc(s.firstKey || '?')} … ${esc(s.lastKey || '?')}</span>
      </div>`
    ).join('');
  }
}

/* ── Refresh ──────────────────────────────────────────────────────────────── */

async function refreshTable() {
  const r = await api('GET', '/scan');
  if (r.ok) renderTable(r.data);
}

async function refreshDebug() {
  const r = await api('GET', '/debug');
  if (r.ok) renderDebug(r.data);
}

async function refresh() {
  await Promise.all([refreshTable(), refreshDebug()]);
}

/* ── Table row helpers ────────────────────────────────────────────────────── */

function fillKey(key) { document.getElementById('gd-key').value = key; }

async function quickGet(key) { fillKey(key); await opGet(); }
async function quickDel(key) { fillKey(key); await opDelete(); }

/* ── Keyboard shortcuts ───────────────────────────────────────────────────── */

document.getElementById('put-val').addEventListener('keydown',     e => { if (e.key === 'Enter') opPut(); });
document.getElementById('put-key').addEventListener('keydown',     e => { if (e.key === 'Enter') document.getElementById('put-val').focus(); });
document.getElementById('gd-key').addEventListener('keydown',      e => { if (e.key === 'Enter') opGet(); });
document.getElementById('scan-prefix').addEventListener('keydown', e => { if (e.key === 'Enter') opScan(); });

/* ── Utilities ────────────────────────────────────────────────────────────── */

function val(id) { return document.getElementById(id).value.trim(); }
function enc(s)  { return encodeURIComponent(s); }
function esc(s)  {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Boot ─────────────────────────────────────────────────────────────────── */

refresh();
</script>
</body>
</html>
